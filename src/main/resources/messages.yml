  non-existent: "<color:#FF6B8A><bold>✖</bold></color> <color:#D6DAEA>This item has been removed!"
  non-existent2: "<color:#FF6B8A>This item has been removed!"
  not-enough-money: "<color:#FF6B8A>You don't have enough money to buy this item!"
