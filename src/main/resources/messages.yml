# Format: MiniMessage Tags (https://docs.advntr.dev/minimessage/format.html)
# Supports <gradient:#9CC3FF:#D9B3FF>...</gradient>, <hover>, <click>,
# <bold>, <italic>, etc. Legacy codes will still be converted automatically.
#
# Color Scheme (Sky Blue -> Lavender):
#   Sky Blue      : #9CC3FF
#   Lavender      : #D9B3FF
#   Deep Sky Blue : #6FA8FF
#   Soft Purple   : #B89BE8
#   Slate Gray    : #8C8FA3
#   Whisper White : #D6DAEA
#
# &n = new line
# Placeholders are documented within each message.
# If a message is set to "" it will not be sent.

chat:
