  already-top-bid: "<color:#9CC3FF>You are already the top bidder!"
  claim-auction: "<gradient:#6FA8FF:#B89BE8>━━━━━━━━━━━━━━━━━━━━━━━━</gradient>&n<color:#9CC3FF>You claimed %item%</color> <color:#D6DAEA>from</color> <color:#B89BE8>%seller%</color>'s auction&n<gradient:#6FA8FF:#B89BE8>━━━━━━━━━━━━━━━━━━━━━━━━</gradient>"
